[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/fixtures"
  to = "/.netlify/functions/fixtures"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/dd782e8a1895120405134e125ae6dab3"
  to = "/.netlify/functions/contract-address"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
